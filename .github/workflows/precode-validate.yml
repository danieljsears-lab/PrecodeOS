name: Precode Validate

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  validate-memory:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Precode memory
        run: bash scripts/validate-memory.sh

      - name: Advisory version check
        run: python3 scripts/version-check.py

      - name: Advisory public repo check
        run: python3 scripts/public-repo-check.py

      - name: Advisory file inventory check
        run: python3 scripts/file-inventory.py --check

      - name: Advisory completion check
        run: python3 scripts/completion-check.py

      - name: Dry-run spend import
        run: python3 scripts/import-agent-spend.py --dry-run

      - name: Read-only GitHub audit
        run: python3 scripts/github-audit.py
